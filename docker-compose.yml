version: "3.9"

# Starts only the PostgreSQL database.
# The Ktor server is run separately via Gradle (see README or run ./gradlew :server:run).
#
# Usage:
#   docker compose up -d        → start Postgres in background
#   docker compose down         → stop and remove containers
#   docker compose down -v      → stop + wipe the database volume

services:
  postgres:
    image: postgres:16-alpine
    container_name: financiallife_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financelifeline
    ports:
      - "5432:5432"       # expose to localhost so Ktor can connect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financelifeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
