name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Run shared + server tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run shared and server tests
        run: ./gradlew :shared:test :server:test --no-daemon
        env:
          # Dev defaults are fine in CI — secret-strength check only fires when PRODUCTION=true
          JWT_SECRET: ci-test-jwt-secret
          ADMIN_KEY: ci-test-admin-key
          SESSION_SECRET: ci-test-session-secret
          SKIP_MIGRATIONS: "true"
