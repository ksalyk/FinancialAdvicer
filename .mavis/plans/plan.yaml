version: 1
plan:
  name: FinancialLifeV2 代码审查
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 5
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0

tasks:
  - id: admin-auth-review
    title: 审查未提交的 Admin Session Auth 代码
    prompt: |
      审查 FinancialLifeV2 项目中 3 个未提交的 admin session auth 文件：

      1. server/src/main/kotlin/kz/fearsom/financiallifev2/server/plugins/AdminSession.kt
      2. server/src/main/kotlin/kz/fearsom/financiallifev2/server/routes/AdminAuthRoutes.kt
      3. server/src/main/kotlin/kz/fearsom/financiallifev2/server/routes/AdminRoutes.kt

      重点审查：
      - HMAC-SHA256 cookie 签名安全性（是否有 timing attack 风险）
      - ADMIN_USERNAME/PASSWORD 的比较方式（是否使用 constant-time compare）
      - Session cookie 的 HttpOnly/Secure/SameSite 属性配置
      - AdminSession 数据类是否有敏感数据泄露
      - 路由是否正确挂载到 /api/v1/admin 下
      - isAdminAuthorized() 的 14 个调用点是否正确支持 session cookie
      - 与现有 Security.kt 的集成是否正确

      同时检查：
      - AdminSession 是否已经在 Application.module() 中 wire
      - AdminAuthRoutes 是否已在 Routing.kt 中 mount
      - SESSION_SECRET 的 fallback 默认值是否在生产中足够安全

      输出：详细的 review 报告，包括发现的问题（严重/警告/建议）和改进建议。
      如有可能，运行 ./gradlew :server:test 确认没有编译/测试错误。
    assigned_to: verifier
    verified_by: ~
    verify_skip_reason: '安全审查类任务，verifier 本身就是 reviewer；结果直接用于人工决策'
    timeout_ms: 600000

  - id: gameengine-review
    title: 审查 GameEngine FSM 核心逻辑
    prompt: |
      审查 FinancialLifeV2 项目的核心游戏引擎：

      1. shared/src/commonMain/kotlin/kz/fearsom/financiallifev2/shared/engine/GameEngine.kt — 3-layer FSM
         - narrative graph 实现
         - PlayerState 经济模拟
         - 5 种结局判定逻辑

      2. shared/src/commonMain/kotlin/kz/fearsom/financiallifev2/shared/engine/ 目录下其他相关文件
         - 状态机转换是否正确处理边界情况
         - 经济模拟的精度问题（Long 存储 vs 浮点计算）
         - investmentReturnRate 是年利率/engine 是否正确除以12
         - monetaryReform vs capitalDelta 的使用是否正确
         - story events 的 unique/priority/pool 逻辑是否正确

      3. 检查 scenarios 相关代码：
         - Scenarios.kt 的 ScenarioGraphFactory
         - characters/ 目录下的角色定义（asan, dana, aidar 等）
         - era 定义（kz_90s, kz_2015, modern_kz_2024）

      输出：详细 review 报告，包括 FSM 正确性、经济模拟精度、代码质量问题。
    assigned_to: verifier
    verified_by: ~
    verify_skip_reason: '技术架构审查，verifier 独立分析；结果直接用于人工决策'
    timeout_ms: 600000

  - id: architecture-review
    title: 审查整体架构与代码质量
    prompt: |
      审查 FinancialLifeV2 项目的整体架构和代码质量：

      1. 模块结构审查：
         - shared/ — KMP engine/models/scenarios
         - composeApp/ — Android+iOS UI (检查是否遵循 NO ViewModel 规范)
         - server/ — Ktor 后端 (JWT RS256, Exposed, migrations)
         - landing/ — Wasm web landing
         - admin/ — 新增 Kotlin/Wasm admin panel

      2. i18n 实现审查：
         - shared/.../i18n/translations/ 下的 ru/kk/en 文件
         - StringKeys enum 是否与翻译文件一致
         - 是否有 reactive language switching（per Codex note，Strings.currentLocale 可变单例）

      3. 数据模型审查：
         - shared/model/ 下的 GameModels.kt
         - PlayerState 结构
         - 5 种结局的定义和判定

      4. Android/iOS 客户端架构：
         - composeApp 中的 Koin + CoroutineScope + MutableStateFlow 使用
         - AppNavigation.kt 的手动 back-stack nav
         - collectAsStateWithLifecycle 的使用

      5. Server 架构：
         - JWT RS256 实现
         - Exposed ORM 使用
         - 版本化 migrations

      输出：架构评审报告，包括模块边界、数据流、设计模式一致性、潜在问题。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证 architecture-review 的输出：
      1. 检查模块边界是否清晰
      2. 验证 i18n 文件一致性
      3. 检查数据模型定义
      4. 确认客户端/服务端架构模式
      不要重新读代码，而是基于 general 的报告进行验证性分析。
    timeout_ms: 600000

  - id: synthesis
    title: 综合审查报告
    prompt: |
      综合所有审查结果，生成最终的 FinancialLifeV2 代码审查报告。

      输入来自：
      - admin-auth-review 的安全审查结果
      - gameengine-review 的 GameEngine FSM 审查结果
      - architecture-review 的架构审查结果

      报告结构：
      1. 执行摘要（关键发现优先级排序）
      2. 安全问题（Critical/High/Medium/Low）
      3. 代码质量问题
      4. 架构建议
      5. 优先修复建议（基于 AdminPanelImpl.md 的步骤顺序）

      重点关注 AdminPanelImpl.md Step 2 的完成状态和剩余工作。

      输出到：/Users/kuanyshsalyk/AndroidStudioProjects/FinancialLifeV2/.mavis/CODE_REVIEW_REPORT.md
    assigned_to: general
    depends_on: [admin-auth-review, gameengine-review, architecture-review]
    verified_by: verifier
    verify_prompt: |
      验证综合报告的完整性：
      1. 是否涵盖所有三个审查 track 的关键发现
      2. 优先级排序是否合理
      3. 修复建议是否具体可执行
      4. 与 AdminPanelImpl.md 的上下文是否一致
    timeout_ms: 300000
